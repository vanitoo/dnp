name: Build Cross-Platform Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name DNP_Receipts receipt_generator.py --noconfirm --clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-windows
          path: dist/DNP_Receipts.exe
          if-no-files-found: error

  build-macos-intel:
    name: Build macOS Intel ZIP and DMG
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip

      - name: Verify Intel architecture
        run: |
          uname -m
          python -c "import platform; print(platform.machine())"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build macOS Intel APP
        run: |
          pyinstaller --windowed --name DNP_Receipts receipt_generator.py --noconfirm --clean --target-arch x86_64
          file dist/DNP_Receipts.app/Contents/MacOS/DNP_Receipts

      - name: Pack macOS Intel ZIP
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent DNP_Receipts.app DNP_Receipts-macos-intel.zip

      - name: Pack macOS Intel DMG
        run: |
          mkdir -p dmg-root
          cp -R dist/DNP_Receipts.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "DNP Receipts Intel" -srcfolder dmg-root -ov -format UDZO dist/DNP_Receipts-macos-intel.dmg

      - name: Upload macOS Intel ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-macos-intel-zip
          path: dist/DNP_Receipts-macos-intel.zip
          if-no-files-found: error

      - name: Upload macOS Intel DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-macos-intel-dmg
          path: dist/DNP_Receipts-macos-intel.dmg
          if-no-files-found: error

  build-macos-arm:
    name: Build macOS Apple Silicon ZIP and DMG
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64
          cache: pip

      - name: Verify Apple Silicon architecture
        run: |
          uname -m
          python -c "import platform; print(platform.machine())"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build macOS Apple Silicon APP
        run: |
          pyinstaller --windowed --name DNP_Receipts receipt_generator.py --noconfirm --clean --target-arch arm64
          file dist/DNP_Receipts.app/Contents/MacOS/DNP_Receipts

      - name: Pack macOS Apple Silicon ZIP
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent DNP_Receipts.app DNP_Receipts-macos-apple-silicon.zip

      - name: Pack macOS Apple Silicon DMG
        run: |
          mkdir -p dmg-root
          cp -R dist/DNP_Receipts.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "DNP Receipts Apple Silicon" -srcfolder dmg-root -ov -format UDZO dist/DNP_Receipts-macos-apple-silicon.dmg

      - name: Upload macOS Apple Silicon ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-macos-apple-silicon-zip
          path: dist/DNP_Receipts-macos-apple-silicon.zip
          if-no-files-found: error

      - name: Upload macOS Apple Silicon DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-macos-apple-silicon-dmg
          path: dist/DNP_Receipts-macos-apple-silicon.dmg
          if-no-files-found: error

  build-linux:
    name: Build Linux archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name DNP_Receipts receipt_generator.py --noconfirm --clean

      - name: Pack Linux archive
        run: |
          cd dist
          tar -czf DNP_Receipts-linux.tar.gz DNP_Receipts

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-linux
          path: dist/DNP_Receipts-linux.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos-intel
      - build-macos-arm
      - build-linux
    if: github.event_name != 'pull_request'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release files
        run: |
          find release-assets -type f -maxdepth 3 -print

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG="build-${{ github.run_number }}"
          TITLE="DNP Receipts build ${{ github.run_number }}"
          NOTES="Windows EXE, Linux archive и две версии macOS: Intel для Mac до перехода на M1, Apple Silicon для M1/M2/M3/M4. Рекомендуемый формат для Mac — DMG."

          FILES=(
            release-assets/DNP_Receipts-windows/DNP_Receipts.exe
            release-assets/DNP_Receipts-macos-intel-zip/DNP_Receipts-macos-intel.zip
            release-assets/DNP_Receipts-macos-intel-dmg/DNP_Receipts-macos-intel.dmg
            release-assets/DNP_Receipts-macos-apple-silicon-zip/DNP_Receipts-macos-apple-silicon.zip
            release-assets/DNP_Receipts-macos-apple-silicon-dmg/DNP_Receipts-macos-apple-silicon.dmg
            release-assets/DNP_Receipts-linux/DNP_Receipts-linux.tar.gz
          )

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes "$NOTES"
          fi
