name: Build Cross-Platform Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name DNP_Receipts receipt_generator.py --noconfirm --clean

      - name: Show dist files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-windows
          path: dist/DNP_Receipts.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS ZIP and DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build macOS APP
        run: |
          pyinstaller --windowed --name DNP_Receipts receipt_generator.py --noconfirm --clean

      - name: Pack macOS ZIP
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent DNP_Receipts.app DNP_Receipts-macos.zip

      - name: Pack macOS DMG
        run: |
          mkdir -p dmg-root
          cp -R dist/DNP_Receipts.app dmg-root/
          hdiutil create -volname "DNP Receipts" -srcfolder dmg-root -ov -format UDZO dist/DNP_Receipts-macos.dmg

      - name: Upload macOS ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-macos-zip
          path: dist/DNP_Receipts-macos.zip
          if-no-files-found: error

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-macos-dmg
          path: dist/DNP_Receipts-macos.dmg
          if-no-files-found: error

  build-linux:
    name: Build Linux archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name DNP_Receipts receipt_generator.py --noconfirm --clean

      - name: Pack Linux archive
        run: |
          cd dist
          tar -czf DNP_Receipts-linux.tar.gz DNP_Receipts

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: DNP_Receipts-linux
          path: dist/DNP_Receipts-linux.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
      - build-linux
    if: github.event_name != 'pull_request'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release files
        run: |
          find release-assets -type f -maxdepth 3 -print

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          gh release create "$TAG" \
            release-assets/DNP_Receipts-windows/DNP_Receipts.exe \
            release-assets/DNP_Receipts-macos-zip/DNP_Receipts-macos.zip \
            release-assets/DNP_Receipts-macos-dmg/DNP_Receipts-macos.dmg \
            release-assets/DNP_Receipts-linux/DNP_Receipts-linux.tar.gz \
            --title "DNP Receipts build ${{ github.run_number }}" \
            --notes "Автоматическая сборка: Windows EXE, macOS ZIP/DMG, Linux archive."
